name: student_mate
description: A comprehensive Flutter-based academic productivity application designed to assist students in managing their academic activities efficiently.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  mongo_dart: ^0.10.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  cupertino_icons: ^1.0.2
  intl: ^0.20.2

  # Utilities
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  file_picker: ^10.3.10
  image_picker: ^1.1.2
  open_filex: ^4.6.0
  syncfusion_flutter_pdfviewer: ^28.2.12
  url_launcher: ^6.3.0
  path_provider: ^2.1.0
  
  # Deep linking and Firebase
  # Note: Firebase removed for Windows desktop builds - causes CMake compilation errors
  # firebase_core: ^3.15.2
  # firebase_dynamic_links: ^6.1.10
  # app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/