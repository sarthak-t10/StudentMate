version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: campus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - campus-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: campus-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/campus_management?authSource=admin
      - MONGODB_USER=admin
      - MONGODB_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      - JWT_EXPIRE=7d
      - CORS_ORIGIN=*
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - campus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: campus-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - campus-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  campus-network:
    driver: bridge
